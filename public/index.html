<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquete</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 100%;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    h2 {
      margin-top: 30px;
      margin-bottom: 15px;
      color: #333;
      font-size: 18px;
    }
    
    ul {
      list-style: none;
    }
    
    li {
      background: #f5f5f5;
      padding: 12px;
      margin: 8px 0;
      border-radius: 5px;
      color: #333;
      border-left: 4px solid #667eea;
    }
    
    li:hover {
      background: #efefef;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🗳️ Enquete</h1>

  <input id="nome" placeholder="Nome">
  <input id="votos" type="number" placeholder="Votos">

  <button onclick="enviar()">Enviar Voto</button>

  <h2>📊 Votos Recebidos:</h2>
  <ul id="lista"></ul>
</div>

<script>

const API_URL = window.location.origin;

async function enviar(){
 const nome = document.getElementById("nome").value;
 const votos = document.getElementById("votos").value;
 
 if(!nome || !votos) {
   alert("Preencha todos os campos!");
   return;
 }

 await fetch(`${API_URL}/vote`,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body: JSON.stringify({
    nome: nome,
    votos: parseInt(votos),
    candidato: "lula"
  })
 });

 document.getElementById("nome").value = "";
 document.getElementById("votos").value = "";
 
 carregar();
}

async function carregar(){
 try {
   let res = await fetch(`${API_URL}/votes`);
   let dados = await res.json();

   let lista = document.getElementById("lista");
   lista.innerHTML="";
   
   if(dados.length === 0) {
     lista.innerHTML = "<li style='border-left-color: #ccc; color: #999;'>Nenhum voto ainda...</li>";
     return;
   }
   
   dados.forEach(d=>{
    lista.innerHTML+=`<li><strong>${d.nome}</strong> - ${d.votos} voto(s)</li>`;
   });
 } catch(err) {
   console.error("Erro ao carregar votos:", err);
 }
}

// Carregar votos ao abrir a página
carregar();

// Atualizar a cada 2 segundos
setInterval(carregar, 2000);

</script>

</body>
</html>
